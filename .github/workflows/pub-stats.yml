name: Pub.dev Downloads (30d)

on:
  schedule:
    - cron: '0 12 * * *'
  push:
    paths:
      - '.github/workflows/pub-stats.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Pub.dev download counts
        env:
          PUB_PUBLISHER: 'leonidov.dev'
        run: |
          import json, urllib.request, os

          publisher = os.environ['PUB_PUBLISHER']
          search_url = f'https://pub.dev/api/search?q=publisher:{publisher}'

          req = urllib.request.Request(search_url, headers={'User-Agent': 'github-action'})
          with urllib.request.urlopen(req, timeout=15) as resp:
              search_data = json.loads(resp.read().decode())

          packages = [p['package'] for p in search_data.get('packages', [])]

          if not packages:
              print('No Pub.dev packages found for publisher', publisher)
              exit(0)

          details = {}
          for pkg in packages:
              url = f'https://pub.dev/api/packages/{pkg}/score'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'github-action'})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  dl = data.get('downloadCount30Days') or 0
                  details[pkg] = dl
                  print(f'  {pkg}: {dl}')
              except Exception as e:
                  print(f'  {pkg}: error - {e}')

          total = sum(details.values())

          result = {
              'schemaVersion': 1,
              'label': 'Pub.dev (30d)',
              'message': str(total),
              'color': '01579B',
              'total': total,
              'packages': len(details),
              'details': details
          }

          with open('pub-total.json', 'w') as f:
              json.dump(result, f, indent=2)
              f.write('\n')

          print(f"Pub.dev total (30d): {total} ({len(details)} packages)")
        shell: python

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pub-total.json
          git diff --staged --quiet || git commit -m "Update Pub.dev download stats [skip ci]"
          git push
